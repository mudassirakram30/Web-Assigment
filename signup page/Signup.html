<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Trade Empire</title>
    <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="./singup.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <a href="../index.html" class="back-link">← Back to Home</a>
        <img src="../All images/header-img (1).png" alt="Trade Empire Logo" class="auth-logo">
        <h1 class="display-title auth-title">Create Account</h1>
        <div class="auth-welcome"><span>Welcome to Trade Empire! </span></div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">First Name</label>
                <input type="text" class="form-input" placeholder="First Name">
            </div>
            <div class="form-group">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-input" placeholder="Last Name">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" placeholder="Your Email">
            </div>
            <div class="form-group">
                <label class="form-label">Mobile Number</label>
                <input type="tel" class="form-input" placeholder="Phone Number">
            </div>
        </div>

        <div class="form-group full">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" maxlength="8" placeholder="Create a Password">
        </div>

        <div class="refund-notice">
            <span class="refund-icon">❗</span>
            <p><strong>NOTE:</strong> Due to the nature of the service and business, there is a <span class="red">STRICT NO REFUND POLICY.</span></p>
        </div>

        <label class="agree-row">
            <input type="checkbox" id="agree">
            <span>I agree with the <span class="red">NO REFUND POLICY</span></span>
        </label>

        <div class="form-group full">
            <input type="text" class="form-input" placeholder='Type "I agree" to confirm'>
        </div>

        <button class="auth-btn" onclick="window.location='../Login Page/login.html'">Register →</button>

        <p class="auth-divider">OR</p>
        <p class="auth-switch">Already have an account?
            <a href="../Login Page/login.html" class="auth-link">Login Here</a>
        </p>
    </div>
</div>

<p class="ccp" style="padding:16px 0">© 2025 Trade Empire. All Rights Reserved.</p>

</body>
</html>
