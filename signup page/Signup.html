<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Trade Empire</title>
    <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="./singup.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <a href="../index.html" class="back-link">← Back to Home</a>
        <img src="../All images/header-img (1).png" alt="Trade Empire Logo" class="auth-logo">
        <h1 class="display-title auth-title">Create Account</h1>
        <div class="auth-welcome"><span>Welcome to Trade Empire! </span></div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">First Name</label>
                <input type="text" class="form-input" placeholder="First Name" id="signupFirstName">
            </div>
            <div class="form-group">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-input" placeholder="Last Name" id="signupLastName">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" placeholder="Your Email" id="signupEmail">
            </div>
            <div class="form-group">
                <label class="form-label">Mobile Number</label>
                <input type="tel" class="form-input" placeholder="Phone Number" id="signupPhone">
            </div>
        </div>

        <div class="form-group full">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" maxlength="8" placeholder="Create a Password" id="signupPass">
        </div>

        <div class="refund-notice">
            <span class="refund-icon">❗</span>
            <p><strong>NOTE:</strong> Due to the nature of the service and business, there is a <span class="red">STRICT NO REFUND POLICY.</span></p>
        </div>

        <label class="agree-row">
            <input type="checkbox" id="agree">
            <span>I agree with the <span class="red">NO REFUND POLICY</span></span>
        </label>

        <div class="form-group full">
            <input type="text" class="form-input" placeholder='Type "I agree" to confirm' id="agreeText">
        </div>

        <button class="auth-btn" id="signupBtn">Register →</button>

        <p class="auth-divider">OR</p>
        <p class="auth-switch">Already have an account?
            <a href="../Login Page/login.html" class="auth-link">Login Here</a>
        </p>
    </div>
</div>

<p class="ccp" style="padding:16px 0">© 2025 Trade Empire. All Rights Reserved.</p>

<!-- EmailJS SDK pehle load ho -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script type="module">
    import { signupWithEmail } from "../firebase.js";

    document.getElementById('signupBtn').addEventListener('click', async () => {

        const firstName = document.getElementById('signupFirstName').value.trim();
        const lastName  = document.getElementById('signupLastName').value.trim();
        const email     = document.getElementById('signupEmail').value.trim();
        const phone     = document.getElementById('signupPhone').value.trim();
        const password  = document.getElementById('signupPass').value.trim();
        const agreed    = document.getElementById('agree').checked;
        const agreeText = document.getElementById('agreeText').value.trim().toLowerCase();

        // Validation
        if (!firstName || !lastName || !email || !phone || !password) {
            alert("Tamam fields bharna zaroori hain.");
            return;
        }
        if (!agreed || agreeText !== "i agree") {
            alert('Pehle "I agree" checkbox tick karo aur text field mein "I agree" likho.');
            return;
        }
        if (password.length < 6) {
            alert("Password kam az kam 6 characters ka hona chahiye.");
            return;
        }

        // FIX 1: EmailJS SDK check
        if (!window.emailjs) {
            alert("Email service load nahi hui. Page refresh karo.");
            return;
        }

        // FIX 2: window.emailjs (module scope fix)
        window.emailjs.init("aZAYbJc4HaaKa9kaR");

        const fullName = `${firstName} ${lastName}`;
        const time     = new Date().toLocaleString();

        // FIX 3: Firebase alag try/catch — fail ho to emails nahi bhejna
        try {
            await signupWithEmail(fullName, email, password);
            console.log("Firebase signup successful");
        } catch (firebaseError) {
            console.error("Firebase Error:", firebaseError);
            alert("Signup fail: " + (firebaseError.message || firebaseError));
            return;
        }

        // Emails sirf Firebase success ke baad
        try {
            await window.emailjs.send("service_r4a94f9", "template_vl5g1wu", {
                user_name:  fullName,
                user_email: email,
                time:       time,
                to_email:   "tradeempire88@gmail.com"
            });
            console.log("Admin email sent");

            await window.emailjs.send("service_r4a94f9", "template_wyjokbr", {
                user_name: fullName,
                to_email:  email
            });
            console.log("User email sent");

        } catch (emailError) {
            console.error("Email Error:", emailError);
            // User register ho chuka hai — email error user ko mat dikhao
        }

    });
</script>

</body>
</html>
